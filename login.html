{% extends "base.html" %}

{% block title %}Login - Resume Shortlisting{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card-glass p-5 fade-in-up">
                <div class="text-center mb-4">
                    <i class="fas fa-rocket fa-3x glow-icon mb-3" style="color: var(--primary);"></i>
                    <h3 class="gradient-text mb-1">Welcome Back</h3>
                    <p class="text-secondary">Sign in to your account</p>
                </div>
                
                <form method="POST" action="{{ url_for('login') }}" novalidate>
                    <!-- Username -->
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control" id="username" name="username" required>
                    </div>
                    
                    <!-- Password -->
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    
                    <!-- Remember Me -->
                    <div class="mb-4">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="remember" name="remember">
                            <label class="form-check-label text-secondary" for="remember">
                                Remember me
                            </label>
                        </div>
                    </div>
                    
                    <!-- Submit Button -->
                    <button type="submit" class="btn btn-gradient w-100 py-2 mb-3">
                        <i class="fas fa-sign-in-alt me-2"></i> Sign In
                    </button>
                </form>
                
                <!-- Divider -->
                <div class="text-center text-secondary mb-3">
                    <small>Don't have an account?</small>
                </div>
                
                <!-- Register Link -->
                <a href="{{ url_for('register') }}" class="btn btn-outline-gradient w-100 py-2">
                    <i class="fas fa-user-plus me-2"></i> Create Account
                </a>
                
                <!-- Help Link -->
                <div class="text-center mt-4">
                    <a href="#" class="text-secondary text-decoration-none small">Forgot password?</a>
                </div>
            </div>
            
            <!-- Features Badge -->
            <div class="text-center mt-4 text-secondary">
                <small>
                    <i class="fas fa-shield-alt me-1"></i> Secure Login
                    <span class="mx-2">•</span>
                    <i class="fas fa-lock me-1"></i> Encrypted
                </small>
            </div>
        </div>
    </div>
</div>

<style>
    body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
    }
    
    main {
        flex: 1;
    }
    
    footer {
        margin-top: auto;
    }
</style>
{% endblock %}
